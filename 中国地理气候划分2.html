            margin: 0; padding: 0; width: 100%; height: 100%;

            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 15px 25px rgba(41, 182, 246, 0.4); 
            background: #03a9f4;
        }

        .cards-container { display: flex; gap: 40px; }
        .menu-card { 
            background: white; width: 320px; padding: 50px 20px; 
            border-radius: 24px; text-align: center; cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); transition: all 0.3s; 
            border-bottom: 8px solid #eceff1; display: flex; flex-direction: column; align-items: center;

            transform: translateY(-12px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);

        .menu-card.c1:hover { border-bottom-color: #4fc3f7; }
        .menu-card.c2:hover { border-bottom-color: #81c784; }
        .menu-card.c3:hover { border-bottom-color: #ba68c8; }
        
        .card-icon { font-size: 5rem; margin-bottom: 25px; }
        .card-title { font-size: 1.6rem; font-weight: bold; color: #37474f; line-height: 1.4;}
        .card-subtitle { font-size: 1.1rem; color: #90a4ae; font-weight: normal; margin-top: 10px;}

        /* 第三页：沙箱视窗 */
        #viewer { 
            display: none; flex-direction: column; width: 100%; height: 100%; 
            background: #fff; opacity: 0; transition: opacity 0.5s ease; 
        }
        #viewer.active { display: flex; opacity: 1; }
        
        /* === 优化后的毛玻璃拟态顶栏 === */
        .viewer-header { 
            height: 64px; 
            background: rgba(255, 255, 255, 0.85); /* 半透明白色 */

</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索数据的分布秘密</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background-color: #f4f8fb; background-image: radial-gradient(#d6eaf8 2px, transparent 2px); background-size: 30px 30px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 30px 20px; color: #333; }
        h1 { color: #0277bd; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); font-size: 2.2em; margin-bottom: 20px; }
        .card { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04); width: 100%; max-width: 900px; margin-bottom: 30px; box-sizing: border-box; border-top: 6px solid #4fc3f7; }
        #input-container { text-align: center; }
        label { font-weight: bold; font-size: 1.2em; color: #455a64; display: block; margin-bottom: 15px; }
        #file-input { padding: 15px; font-size: 16px; color: #576574; background: #fafafa; border: 2px dashed #b0bec5; border-radius: 12px; cursor: pointer; width: 70%; transition: all 0.3s; }
        #file-input:hover { border-color: #29b6f6; background: #e1f5fe; }
        #plot-container { height: 200px; position: relative; overflow: visible; margin-top: 20px; }
        #number-line { width: 90%; height: 4px; background-color: #78909c; position: absolute; top: 50%; left: 5%; transform: translateY(-50%); border-radius: 2px; }
        #number-line::after { content: ''; position: absolute; right: -12px; top: -6px; border-left: 16px solid #78909c; border-top: 8px solid transparent; border-bottom: 8px solid transparent; }
        .tick { width: 2px; height: 16px; background-color: #78909c; position: absolute; top: -6px; transform: translateX(-50%); border-radius: 1px; }
        .tick-label { position: absolute; top: 20px; transform: translateX(-50%); font-size: 14px; font-weight: bold; color: #546e7a; }
        #dots-container { width: 90%; height: 100%; position: absolute; top: 0; left: 5%; }
        .dot { width: 14px; height: 14px; background-color: rgba(41, 182, 246, 0.6); border: 2px solid #0277bd; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s; box-sizing: border-box; cursor: pointer; mix-blend-mode: multiply; }
        .dot:hover { transform: translate(-50%, -50%) scale(2.2); background-color: rgba(255, 167, 38, 0.9); border-color: #ef6c00; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.15); mix-blend-mode: normal; }
        #tooltip { position: absolute; background: #37474f; color: white; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 200; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transform: translate(-50%, -150%); }
        #tooltip::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-top: 6px solid #37474f; border-left: 6px solid transparent; border-right: 6px solid transparent; }
    </style>
</head>
<body>
    <h1>📊 探索数据的秘密：一维散点分布</h1>
    <div class="card" id="input-container">
        <label for="file-input">📂 导入数据文件 (.csv, .xlsx 或 .xls)：</label>
        <input type="file" id="file-input" accept=".csv, .xlsx, .xls">
        <p style="font-size: 13px; color: #90a4ae; margin-top: 10px;">无论尺度多大或多小，数轴都会自动伸缩以适应你的数据！</p>
    </div>
    <div class="card" id="plot-container">
        <div id="number-line"></div>
        <div id="dots-container"></div>
        <div id="tooltip"></div>
    </div>
    <script>
        document.getElementById('file-input').addEventListener('change', handleFile);
        const tooltip = document.getElementById('tooltip');

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                const numericData = jsonData.flat().map(Number).filter(n => !isNaN(n) && n !== null && n !== "");

                if (numericData.length === 0) {
                    alert('数据文件中没有找到有效的数字哦，请检查格式！');
                    return;
                }
                parent.postMessage({ type: 'import_data', module: '数据分析', detail: '导入了数据文件，共' + numericData.length + '条数据' }, '*');
                plotDots(numericData);
            };
            reader.readAsArrayBuffer(file);
        }

        function getNiceTickSpacing(min, max) {
            const range = max - min;
            if (range === 0) return 1; 
            const targetTickCount = 8; 
            const roughStep = range / targetTickCount;
            const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
            const normalizedStep = roughStep / magnitude;

            let niceStep;
            if (normalizedStep < 1.5) niceStep = 1;
            else if (normalizedStep < 3.5) niceStep = 2;
            else if (normalizedStep < 7.5) niceStep = 5;
            else niceStep = 10;

            return niceStep * magnitude;
        }

        function plotDots(data) {
            const dotsContainer = document.getElementById('dots-container');
            dotsContainer.innerHTML = ''; 
            const numberLine = document.getElementById('number-line');
            const existingElements = numberLine.querySelectorAll('.tick, .tick-label');
            existingElements.forEach(el => el.remove());

            const minVal = Math.min(...data);
            const maxVal = Math.max(...data);
            const tickSpacing = getNiceTickSpacing(minVal, maxVal);

            const axisMin = Math.floor(minVal / tickSpacing) * tickSpacing;
            const axisMax = Math.ceil(maxVal / tickSpacing) * tickSpacing + tickSpacing; 

            const plotContainer = document.getElementById('plot-container');
            const plotWidth = plotContainer.offsetWidth * 0.9; 
            const scaleFactor = plotWidth / (axisMax - axisMin);

            for (let i = axisMin; i <= axisMax; i += tickSpacing) {
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.left = (i - axisMin) * scaleFactor + 'px';
                numberLine.appendChild(tick);

                const tickLabel = document.createElement('div');
                tickLabel.className = 'tick-label';
                tickLabel.style.left = (i - axisMin) * scaleFactor + 'px';
                tickLabel.textContent = parseFloat(i.toPrecision(10));
                numberLine.appendChild(tickLabel);
            }

            data.forEach(value => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                const xPos = (value - axisMin) * scaleFactor;
                dot.style.left = xPos + 'px';
                
                dot.addEventListener('mouseenter', (e) => {
                    tooltip.textContent = '数据: ' + value; 
                    tooltip.style.opacity = 1;
                    const containerRect = plotContainer.getBoundingClientRect();
                    const dotRect = dot.getBoundingClientRect();
                    tooltip.style.left = (dotRect.left - containerRect.left + dotRect.width / 2 + plotContainer.offsetWidth * 0.05) + 'px';
                    tooltip.style.top = (dotRect.top - containerRect.top) + 'px';
                });

                dot.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });
                dotsContainer.appendChild(dot);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>

</head>
<body>
<div class="toolbar">
    <input type="file" id="fileInput" accept=".csv, .xlsx">
    <button class="btn" onclick="resetAll()">清空重置</button>
    <button class="btn btn-confirm" onclick="confirmAndDraw()">确定分组 (生成数轴)</button>
</div>
<div id="sumBoard">等待选择同类数值...</div>
<div id="visualization">
    <h3 style="margin-top:0; text-align:center; color:#546e7a;">数据分布数轴</h3>
    <div class="number-line" id="numLine"></div>
</div>
<div class="container">
    <div class="column">
        <div class="col-header" style="background: #eceff1; color:#455a64;">待分组数据 <button class="btn" style="padding:4px 12px; margin-left:10px; background:#cfd8dc; color:#37474f;" onclick="toggleSort()">排列</button></div>
        <div id="listPool" class="data-list"></div>
    </div>
    <div class="column">
        <div class="col-header" style="background: #fff8e1; color: #f57f17;">A 组</div>
        <div id="listA" class="data-list"></div>
        <div class="stats-area">
            <div class="stats-row">
                <button onclick="calcStat('A', 'mean', '平均数')">求平均</button>
                <button onclick="calcStat('A', 'range', '极差')">求极差</button>
            </div>
            <div class="stats-row">
                <button onclick="calcStat('A', 'variance', '方差')">求方差</button>
                <button onclick="calcStat('A', 'ss', '离差平方和')">求离差平方和</button>
            </div>
            <div class="result-box" id="resA"></div>
        </div>
    </div>
    <div class="column">
        <div class="col-header" style="background: #e3f2fd; color: #1565c0;">B 组</div>
        <div id="listB" class="data-list"></div>
        <div class="stats-area">
            <div class="stats-row">
                <button onclick="calcStat('B', 'mean', '平均数')">求平均</button>
                <button onclick="calcStat('B', 'range', '极差')">求极差</button>
            </div>
            <div class="stats-row">
                <button onclick="calcStat('B', 'variance', '方差')">求方差</button>
                <button onclick="calcStat('B', 'ss', '离差平方和')">求离差平方和</button>
            </div>
            <div class="result-box" id="resB"></div>
        </div>
    </div>
</div>
<script>
    let dataItems = []; let isSorted = false; let selectedCards = []; let globalMin = 0, globalMax = 0;
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            const rawNumbers = json.flat().filter(v => typeof v === 'number');
            dataItems = rawNumbers.map((val, index) => ({ id: index, val: val, group: 'pool' }));
            if(dataItems.length > 0) { globalMin = Math.min(...rawNumbers); globalMax = Math.max(...rawNumbers); }
            parent.postMessage({ type: 'import_data', module: '模型建立', detail: '导入了数据文件，共' + rawNumbers.length + '条数据' }, '*');
            renderAll();
        };
        reader.readAsArrayBuffer(file);
    });
    function toggleSort() { isSorted = !isSorted; renderAll(); }
    function moveItem(id, targetGroup) {
        dataItems.find(d => d.id === id).group = targetGroup;
        clearAllCalculations(); document.getElementById('visualization').style.display = 'none'; renderAll();
    }
    function renderAll() {
        if(dataItems.length === 0) {
            document.getElementById('listPool').innerHTML = '<p style="text-align:center; color:#90a4ae; margin-top:20px;">请先上传文件</p>'; return;
        }
        let poolItems = dataItems.filter(d => d.group === 'pool');
        if (isSorted) poolItems.sort((a, b) => b.val - a.val); else poolItems.sort((a, b) => a.id - b.id);
        const aItems = dataItems.filter(d => d.group === 'A'); const bItems = dataItems.filter(d => d.group === 'B');
        document.getElementById('listPool').innerHTML = poolItems.map(d => `<div class="data-item"><b>${d.val}</b><div class="item-btns"><button class="btn-to-a" onclick="moveItem(${d.id}, 'A')">入A</button><button class="btn-to-b" onclick="moveItem(${d.id}, 'B')">入B</button></div></div>`).join('');
        document.getElementById('listA').innerHTML = aItems.map(d => `<div class="data-item" style="border-left:4px solid var(--group-a);"><b>${d.val}</b><div class="item-btns"><button style="background:#eceff1;color:#546e7a;" onclick="moveItem(${d.id}, 'pool')">撤回</button></div></div>`).join('');
        document.getElementById('listB').innerHTML = bItems.map(d => `<div class="data-item" style="border-left:4px solid var(--group-b);"><b>${d.val}</b><div class="item-btns"><button style="background:#eceff1;color:#546e7a;" onclick="moveItem(${d.id}, 'pool')">撤回</button></div></div>`).join('');
    }
    function calcStat(groupName, typeId, typeName) {
        const arr = dataItems.filter(d => d.group === groupName).map(d => d.val);
        if(arr.length === 0) { alert("该组无数据！"); return; }
        let result = 0; const n = arr.length; const mean = arr.reduce((a,b)=>a+b,0) / n;
        if(typeId === 'mean') result = mean;
        if(typeId === 'range') result = Math.max(...arr) - Math.min(...arr);
        if(typeId === 'ss') result = arr.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0);
        if(typeId === 'variance') result = arr.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / n;
        const cardId = `card_${groupName}_${typeId}`;
        if(document.getElementById(cardId)) document.getElementById(cardId).remove(); 
        const html = `<div id="${cardId}" class="stat-card" data-group="${groupName}" data-typeid="${typeId}" data-typename="${typeName}" data-val="${result}" onclick="toggleSelect(this)">${typeName}<br/><b>${result.toFixed(2)}</b></div>`;
        document.getElementById(`res${groupName}`).insertAdjacentHTML('beforeend', html);
    }
    function toggleSelect(element) {
        if (element.classList.contains('selected')) {
            element.classList.remove('selected'); selectedCards = selectedCards.filter(el => el.id !== element.id);
        } else {
            if(selectedCards.length >= 2) selectedCards.shift().classList.remove('selected');
            element.classList.add('selected'); selectedCards.push(element);
        }
        evaluateSum();
    }
    function evaluateSum() {
        const board = document.getElementById('sumBoard');
        if(selectedCards.length === 2) {
            if(selectedCards[0].dataset.typeid === selectedCards[1].dataset.typeid) {
                board.style.display = 'block';
                board.innerHTML = `两组的 ${selectedCards[0].dataset.typename} 之和: <span class="sum-highlight">${(parseFloat(selectedCards[0].dataset.val) + parseFloat(selectedCards[1].dataset.val)).toFixed(2)}</span>`;
            } else {
                board.style.display = 'block'; board.innerHTML = `<span style="color:#ef5350;">请选择相同类型的指标进行相加（例如：A组离差平方和 + B组离差平方和）</span>`;
            }
        } else { board.style.display = 'none'; }
    }
    function clearAllCalculations() { document.getElementById('resA').innerHTML = ''; document.getElementById('resB').innerHTML = ''; selectedCards = []; document.getElementById('sumBoard').style.display = 'none'; }
    function resetAll() { dataItems = []; document.getElementById('fileInput').value = ''; clearAllCalculations(); document.getElementById('visualization').style.display = 'none'; renderAll(); }
    function confirmAndDraw() {
        const aItems = dataItems.filter(d => d.group === 'A'); const bItems = dataItems.filter(d => d.group === 'B');
        if(aItems.length === 0 && bItems.length === 0) { alert("请先将数据放入A组或B组！"); return; }
        parent.postMessage({ type: 'confirm_group', module: '模型建立', detail: '确定分组：A组' + aItems.length + '条，B组' + bItems.length + '条' }, '*');
        const line = document.getElementById('numLine'); document.getElementById('visualization').style.display = 'block'; line.innerHTML = ''; 
        let range = globalMax - globalMin || 1; 
        line.innerHTML += `<div class="nl-label" style="left:0%;">${globalMin}</div><div class="nl-label" style="left:100%;">${globalMax}</div>`;
        aItems.forEach(d => { line.innerHTML += `<div class="nl-dot dot-a" style="left:${((d.val - globalMin) / range) * 100}%;" title="A组: ${d.val}"></div>`; });
        bItems.forEach(d => { line.innerHTML += `<div class="nl-dot dot-b" style="left:${((d.val - globalMin) / range) * 100}%;" title="B组: ${d.val}"></div>`; });
    }
</script>
</body>
</html>

    <style>

        .btn-opt:hover { background: #ffecb3; border-color: #ffca28; color: #f57f17;}
        #map-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; display: none; flex-direction: column; backdrop-filter: blur(5px);}
        .close-map { position: absolute; top: 20px; right: 30px; z-index: 101; background: #455a64; color: white; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s;}
        .close-map:hover { background: #263238; transform: scale(1.05);}
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h1>🌍 地理区域分类差异实验台</h1>
        <div class="header-btns">
            <input type="file" id="upload" accept=".xlsx, .xls" style="display:none">
            <button class="btn btn-upload" onclick="document.getElementById('upload').click()">📂 导入Excel数据</button>
            <button class="btn btn-map" id="map-entry" onclick="openMap()">🗺️ 查看地图分布</button>
            <button class="btn" onclick="location.reload()">🧹 重置</button>
        </div>
    </header>
    <main>
        <div class="data-card">
            <div class="card-header">数据排序列表 (点击行放置隔板)</div>
            <ul id="data-list"><div style="padding:50px; text-align:center; color:#b0bec5; font-size:12px;">等待导入数据...</div></ul>
        </div>
        <div class="report-card" id="report-view">
            <div class="report-toolbar">
                <div style="font-size:13px; font-weight:bold; color:#455a64;">全样本总SST: <span id="sst-display" style="color:var(--primary-blue)">0</span></div>
                <div class="switch-box">
                    <span>显示比率 (SSW/SST)</span>
                    <div class="toggle" id="ratio-toggle" onclick="toggleRatio()"></div>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="10%">分割位</th><th width="24%">组A (中位/平均/SSD)</th><th width="24%">组B (中位/平均/SSD)</th>
                            <th width="14%">两组SSD和(SSW)</th><th width="14%" class="ratio-col">比率值</th><th width="14%">标记最优</th>
                        </tr>
                    </thead>
                    <tbody id="result-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="map-overlay">
        <div class="close-map" onclick="document.getElementById('map-overlay').style.display='none'">退出地图</div>
        <div id="map-canvas" style="width:100%; height:100%;"></div>
    </div>
</div>
<script>
    let geoItems = []; let sstValue = 0; let splitIdx = -1; let markedConfig = null;
    document.getElementById('upload').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const raw = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1});
            let temp = [];
            raw.forEach(row => {
                let name = row[0] ? row[0].toString().trim() : ""; let val = parseFloat(row[1]);
                if(name && !isNaN(val)) temp.push({ name: name.replace(/省|市|自治区|特别行政区|维吾尔|回族|壮族/g, ""), value: val });
            });
            geoItems = temp.sort((a, b) => b.value - a.value);
            sstValue = calcSSD(geoItems.map(d => d.value));
            document.getElementById('sst-display').innerText = sstValue.toFixed(2);
            splitIdx = -1; renderDataList(); document.getElementById('result-body').innerHTML = ''; document.getElementById('map-entry').style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    });
    function renderDataList() {
        const list = document.getElementById('data-list'); list.innerHTML = '';
        geoItems.forEach((item, i) => {
            const li = document.createElement('li'); li.className = 'data-item';
            if (splitIdx !== -1) li.classList.add(i <= splitIdx ? 'item-a' : 'item-b');
            li.innerHTML = `<span class="num-tag">${i+1}</span><span class="prov">${item.name}</span><b>${item.value}</b>`;
            li.onclick = () => performSplit(i); list.appendChild(li);
            if (i === splitIdx) { const div = document.createElement('div'); div.className = 'divider'; list.appendChild(div); }
        });
    }
    function performSplit(idx) {
        splitIdx = idx; renderDataList();
        const groupA = geoItems.slice(0, idx + 1); const groupB = geoItems.slice(idx + 1);
        const sA = getStats(groupA.map(d => d.value)); const sB = getStats(groupB.map(d => d.value));
        const sumSSW = sA.ssdVal + sB.ssdVal; const ratio = (sumSSW / sstValue).toFixed(4);
        parent.postMessage({ type: 'split_data', module: '模型求解', detail: '在位置#' + (idx+1) + '分割，SSW=' + sumSSW.toFixed(2) + '，比率=' + ratio }, '*');
        const tbody = document.getElementById('result-body'); const row = document.createElement('tr'); row.dataset.idx = idx;
        row.innerHTML = `<td># ${idx + 1}</td><td>${sA.med}/${sA.avg}/${sA.ssd}</td><td>${sB.med}/${sB.avg}/${sB.ssd}</td><td style="color:#ef6c00; font-weight:bold">${sumSSW.toFixed(2)}</td><td class="ratio-col">${ratio}</td><td><button class="btn-opt" onclick="markOptimal(this)">🏆 选定</button></td>`;
        tbody.insertBefore(row, tbody.firstChild);
    }
    function markOptimal(btn) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('optimal-row'));
        const row = btn.closest('tr'); row.classList.add('optimal-row');
        const idx = parseInt(row.dataset.idx);
        markedConfig = { aList: geoItems.slice(0, idx + 1).map(d => d.name), bList: geoItems.slice(idx + 1).map(d => d.name) };
        parent.postMessage({ type: 'mark_optimal', module: '模型求解', detail: '选定最优分割位#' + (idx+1) + '，A组:' + markedConfig.aList.join('、') + '，B组:' + markedConfig.bList.join('、') }, '*');
        document.getElementById('map-entry').style.display = 'block';
    }
    function toggleRatio() { document.getElementById('ratio-toggle').classList.toggle('active'); document.getElementById('report-view').classList.toggle('show-ratio'); }
    function openMap() {
        document.getElementById('map-overlay').style.display = 'flex';
        const chart = echarts.init(document.getElementById('map-canvas'));
        const mapData = geoItems.map(d => {
            let cat = -1; if(markedConfig.aList.includes(d.name)) cat = 1; else if(markedConfig.bList.includes(d.name)) cat = 0;
            return { name: d.name, value: cat, realValue: d.value };
        });
        chart.setOption({
            title: { text: '地理分布差异图 (蓝色:A组, 绿色:B组)', left: 'center', top: 20 },
            tooltip: { trigger: 'item', formatter: p => `${p.name}<br/>原始值: ${p.data ? p.data.realValue : '无'}` },
            visualMap: { type: 'piecewise', pieces: [{value: 1, label: 'A组', color: '#29b6f6'}, {value: 0, label: 'B组', color: '#66bb6a'}], left: '5%', bottom: '10%' },
            series: [{ type: 'map', map: 'china', data: mapData, label: { show: true, fontSize: 10 } }]
        });
        window.onresize = chart.resize;
    }
    function getStats(arr) {
        if(arr.length === 0) return {med:0, avg:0, ssd:0, ssdVal:0};
        const avg = arr.reduce((a,b)=>a+b,0)/arr.length;
        const med = arr.length%2===0 ? (arr[arr.length/2-1]+arr[arr.length/2])/2 : arr[Math.floor(arr.length/2)];
        const ssdVal = arr.reduce((a,b)=>a+Math.pow(b-avg,2), 0);
        return { med: med.toFixed(1), avg: avg.toFixed(1), ssd: ssdVal.toFixed(1), ssdVal: ssdVal };
    }
    function calcSSD(arr) { const avg = arr.reduce((a,b)=>a+b,0)/arr.length; return arr.reduce((a,b)=>a+Math.pow(b-avg,2), 0); }
</script>
